<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Sin esta linea, las tildes y la ñ se veran con simbolos raros -->
  <meta charset="UTF-8">
  <!-- Hace que el ancho de la pagina sea el del dispositivo movil -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Texto que aparece en la pestana del navegador -->
  <title>Calendario — Plataforma</title>
  <!-- Se conecta con Google Fonts para descargar las fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <!-- Estilos compartidos de todo el proyecto -->
  <link rel="stylesheet" href="../css/global.css">
  <!-- Estilos exclusivos del calendario -->
  <link rel="stylesheet" href="../css/calendario.css">
</head>
<body>

  <div class="page">

    <!-- Encabezado con navegacion de mes -->
    <div class="header">
      <h2>Calendario</h2>
      <div class="header-nav">
        <!-- Boton mes anterior -->
        <button onclick="cambiarMes(-1)">&#8249;</button>
        <!-- Mes y año actual — se llena con JS -->
        <span id="mesAnio"></span>
        <!-- Boton mes siguiente -->
        <button onclick="cambiarMes(1)">&#8250;</button>
      </div>
    </div>

    <!-- Nombres de los dias de la semana -->
    <div class="dias-semana">
      <div class="dia-nombre">Dom</div>
      <div class="dia-nombre">Lun</div>
      <div class="dia-nombre">Mar</div>
      <div class="dia-nombre">Mié</div>
      <div class="dia-nombre">Jue</div>
      <div class="dia-nombre">Vie</div>
      <div class="dia-nombre">Sáb</div>
    </div>

    <!-- Grilla del calendario — se llena con JS -->
    <div class="calendario-grid" id="calendarioGrid"></div>

    <!-- Detalle del dia seleccionado — oculto por defecto -->
    <div class="detalle-dia" id="detalleDia">
      <p class="detalle-titulo" id="detalleTitulo"></p>
      <div class="detalle-row">
        <span class="label">Gastos del día</span>
        <span class="monto-gasto" id="detalleGastos">$0</span>
      </div>
      <div class="detalle-row">
        <span class="label">Ingresos del día</span>
        <span class="monto-ingreso" id="detalleIngresos">$0</span>
      </div>
    </div>

  </div>

  <!-- Barra de navegacion inferior -->
  <nav class="navbar">

    <a href="dashboard.html" class="nav-item">
      <svg viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Inicio
    </a>

    <a href="calendario.html" class="nav-item active">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Calendario
    </a>

    <a href="historial.html" class="nav-item">
      <svg viewBox="0 0 24 24">
        <line x1="8" y1="6" x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      Historial
    </a>

    <a href="perfil.html" class="nav-item">
      <svg viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Perfil
    </a>

  </nav>

  <!-- Archivo JS con la logica del calendario -->
  <script src="../js/calendario.js"></script>

</body>
</html>
