<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Sin esta linea, las tildes y la ñ se veran con simbolos raros -->
  <meta charset="UTF-8">
  <!-- Hace que el ancho de la pagina sea el del dispositivo movil -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Texto que aparece en la pestana del navegador -->
  <title>Dashboard — Plataforma</title>
  <!-- Se conecta con Google Fonts para descargar las fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <!-- Estilos compartidos de todo el proyecto -->
  <link rel="stylesheet" href="../css/global.css">
  <!-- Estilos exclusivos del dashboard -->
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <!-- Contenido principal del dashboard -->
  <div class="dashboard">

    <!-- Encabezado con saludo y logo -->
    <div class="header">
      <div class="header-info">
        <!-- El nombre se llena con JS segun el usuario logueado -->
        <h2 id="saludo">Hola, ...</h2>
        <!-- El mes y año se llena con JS -->
        <p id="fechaActual"></p>
      </div>
      <img src="../img/logo.png" class="header-logo" alt="Plata-Forma">
    </div>

    <!-- Alerta de presupuesto, oculta por defecto -->
    <div class="alerta" id="alertaPresupuesto">
      <p class="alerta-titulo" id="alertaTitulo"></p>
      <p id="alertaMensaje"></p>
    </div>

    <!-- Tarjeta de balance total -->
    <div class="card-balance">
      <p class="label">Balance del mes</p>
      <!-- El monto se llena con JS -->
      <p class="monto" id="balance">$0</p>
      <p class="mes" id="balanceMes"></p>
    </div>

    <!-- Tarjetas de ingresos y gastos -->
    <div class="cards-row">

      <!-- Tarjeta de ingresos -->
      <div class="card-mini">
        <p class="label">
          <span class="dot dot-ingreso"></span>
          Ingresos
        </p>
        <!-- El monto se llena con JS -->
        <p class="monto" id="totalIngresos">$0</p>
      </div>

      <!-- Tarjeta de gastos -->
      <div class="card-mini">
        <p class="label">
          <span class="dot dot-gasto"></span>
          Gastos
        </p>
        <!-- El monto se llena con JS -->
        <p class="monto" id="totalGastos">$0</p>
      </div>

    </div>

    <!-- Accesos rapidos a otras pantallas -->
    <p class="accesos-titulo">Accesos rápidos</p>
    <div class="accesos-grid">

      <a href="gastos.html" class="acceso-btn">
        <span class="acceso-icono">💸</span>
        <span>Registrar gasto</span>
        <span class="acceso-label">Categorías</span>
      </a>

      <a href="ingresos.html" class="acceso-btn">
        <span class="acceso-icono">💰</span>
        <span>Registrar ingreso</span>
        <span class="acceso-label">Fuentes</span>
      </a>

      <a href="presupuesto.html" class="acceso-btn">
        <span class="acceso-icono">🎯</span>
        <span>Presupuesto</span>
        <span class="acceso-label">Mensual</span>
      </a>

      <a href="historial.html" class="acceso-btn">
        <span class="acceso-icono">📋</span>
        <span>Historial</span>
        <span class="acceso-label">Compras</span>
      </a>

    </div>

  </div>

  <!-- Barra de navegacion inferior -->
  <nav class="navbar">

    <!-- Inicio - Dashboard -->
    <a href="dashboard.html" class="nav-item active">
      <svg viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Inicio
    </a>

    <!-- Calendario -->
    <a href="calendario.html" class="nav-item">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Calendario
    </a>

    <!-- Historial -->
    <a href="historial.html" class="nav-item">
      <svg viewBox="0 0 24 24">
        <line x1="8" y1="6" x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      Historial
    </a>

    <!-- Perfil -->
    <a href="perfil.html" class="nav-item">
      <svg viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Perfil
    </a>

  </nav>

  <!-- Archivo JS con la logica del dashboard -->
  <script src="../js/dashboard.js"></script>

</body>
</html>
