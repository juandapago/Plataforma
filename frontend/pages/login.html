<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Sin esta linea, las tildes y la ñ se veran con simbolos raros -->
  <meta charset="UTF-8">
  <!-- Hace que el ancho de la pagina sea el del dispositivo movil -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Texto que aparece en la pestana del navegador -->
  <title>Iniciar Sesión — Plataforma</title>
  <!-- Se conecta con Google Fonts para descargar las fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <!-- Estilos compartidos de todo el proyecto -->
  <link rel="stylesheet" href="../css/global.css">
  <!-- Estilos exclusivos del login y registro -->
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

  <!-- Tarjeta principal del formulario -->
  <div class="card">

  <!-- Logo de la app -->
  <img src="../img/logo.png" class="logo-app" alt="Plata-Forma">

  <!-- Titulo y subtitulo -->
  <h1>Bienvenido</h1>
  <p class="subtitle">Ingresa tus datos para continuar.</p>

    <!-- Mensaje de exito, oculto por defecto -->
    <div class="success-banner" id="successBanner">
      ¡Sesión iniciada correctamente!
    </div>

    <!-- Campo correo electronico -->
    <div class="field">
      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" placeholder="tucorreo@ejemplo.com">
      <!-- Mensaje de error, oculto por defecto -->
      <p class="error-msg" id="correoError">Ingresa un correo válido.</p>
    </div>

    <!-- Campo contraseña -->
    <div class="field">
      <label for="contrasena">Contraseña</label>
      <input type="password" id="contrasena" placeholder="••••••••">
      <!-- Mensaje de error, oculto por defecto -->
      <p class="error-msg" id="contrasenaError">La contraseña debe tener al menos 6 caracteres.</p>      
    </div>

    <!-- Boton de ingresar — onclick llama a la funcion en auth.js -->
    <button class="btn" id="btnIngresar" onclick="iniciarSesion()">
      <span class="btn-text">Ingresar</span>
      <!-- Spinner oculto, aparece mientras carga -->
      <div class="spinner"></div>
    </button>

    <!-- Divisor visual -->
    <div class="divider"><span>o</span></div>

    <!-- Link para ir al registro -->
    <p class="auth-link">
      ¿No tienes cuenta? <a href="register.html">Crear cuenta</a>
    </p>

  </div>

  <!-- Archivo JS con la logica del login -->
  <script src="../js/auth.js"></script>

</body>
</html>
