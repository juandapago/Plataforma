<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Sin esta linea, las tildes y la ñ se veran con simbolos raros -->
  <meta charset="UTF-8">
  <!-- Hace que el ancho de la pagina sea el del dispositivo movil -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Texto que aparece en la pestana del navegador -->
  <title>Crear Cuenta — Plataforma</title>
  <!-- Se conecta con Google Fonts para descargar las fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <!-- Estilos compartidos de todo el proyecto -->
  <link rel="stylesheet" href="../css/global.css">
  <!-- Estilos exclusivos del login y registro -->
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

  <!-- Tarjeta principal del formulario -->
  <div class="card">

    <!-- Logo de la app -->
    <img src="../img/logo.png" class="logo-app" alt="Plata-Forma">

    <!-- Titulo y subtitulo -->
    <h1>Crear cuenta</h1>
    <p class="subtitle">Completa los campos para registrarte.</p>

    <!-- Mensaje de exito, oculto por defecto -->
    <div class="success-banner" id="successBanner">
      ¡Cuenta creada correctamente! Redirigiendo...
    </div>

    <!-- Campo nombre completo -->
    <div class="field">
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" placeholder="Tu nombre">
      <!-- Mensaje de error, oculto por defecto -->
      <p class="error-msg" id="nombreError">Ingresa tu nombre completo.</p>
    </div>

    <!-- Campo correo electronico -->
    <div class="field">
      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" placeholder="tucorreo@ejemplo.com">
      <!-- Mensaje de error, oculto por defecto -->
      <p class="error-msg" id="correoError">Ingresa un correo válido.</p>
    </div>

    <!-- Campo contraseña con barra de fortaleza -->
    <div class="field">
      <label for="contrasena">Contraseña</label>
      <!-- oninput llama a verificarFortaleza() cada vez que el usuario escribe -->
      <input type="password" id="contrasena" placeholder="Mínimo 6 caracteres" oninput="verificarFortaleza()">
      <!-- Cuatro barras de fortaleza -->
      <div class="strength-bar">
        <span id="b1"></span>
        <span id="b2"></span>
        <span id="b3"></span>
        <span id="b4"></span>
      </div>
      <!-- Texto que indica el nivel de fortaleza -->
      <p class="strength-label" id="strengthLabel"></p>
      <!-- Mensaje de error, oculto por defecto -->
      <p class="error-msg" id="contrasenaError">La contraseña debe tener al menos 6 caracteres.</p>
    </div>

    <!-- Campo confirmar contraseña -->
    <div class="field">
      <label for="confirmar">Confirmar contraseña</label>
      <input type="password" id="confirmar" placeholder="Repite tu contraseña">
      <!-- Mensaje de error, oculto por defecto -->
      <p class="error-msg" id="confirmarError">Las contraseñas no coinciden.</p>
    </div>

    <!-- Boton de registro — onclick llama a la funcion en auth.js -->
    <button class="btn" id="btnRegistrar" onclick="crearCuenta()">
      <span class="btn-text">Crear cuenta</span>
      <!-- Spinner oculto, aparece mientras carga -->
      <div class="spinner"></div>
    </button>

    <!-- Divisor visual -->
    <div class="divider"><span>o</span></div>

    <!-- Link para ir al login -->
    <p class="auth-link">
      ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
    </p>

  </div>

  <!-- Archivo JS con la logica del registro -->
  <script src="../js/auth.js"></script>

</body>
</html>
