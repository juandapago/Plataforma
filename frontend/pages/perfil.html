<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Sin esta linea, las tildes y la ñ se veran con simbolos raros -->
  <meta charset="UTF-8">
  <!-- Hace que el ancho de la pagina sea el del dispositivo movil -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Texto que aparece en la pestana del navegador -->
  <title>Perfil — Plataforma</title>
  <!-- Se conecta con Google Fonts para descargar las fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <!-- Estilos compartidos de todo el proyecto -->
  <link rel="stylesheet" href="../css/global.css">
  <!-- Estilos exclusivos del perfil -->
  <link rel="stylesheet" href="../css/perfil.css">
</head>
<body>

  <div class="page">

    <!-- Encabezado -->
    <div class="header">
      <h2>Mi perfil</h2>
    </div>

    <!-- Avatar con iniciales del usuario -->
    <div class="avatar-section">
      <!-- Las iniciales se llenan con JS -->
      <div class="avatar" id="avatar">--</div>
      <p class="avatar-nombre" id="avatarNombre">Cargando...</p>
      <p class="avatar-email" id="avatarEmail"></p>
    </div>

    <!-- Mensaje de exito, oculto por defecto -->
    <div class="success-banner" id="successBanner">
      ¡Perfil actualizado correctamente!
    </div>

    <!-- Campo de nombre -->
    <div class="form-section">
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" placeholder="Tu nombre">
      <p class="error-msg" id="nombreError">Ingresa tu nombre.</p>
    </div>

    <!-- Campo de email deshabilitado -->
    <div class="form-section">
      <label for="email">Correo electrónico</label>
      <!-- El email no se puede editar -->
      <input type="email" id="email" placeholder="tucorreo@ejemplo.com" disabled style="opacity: 0.5; cursor: not-allowed;">
    </div>

    <!-- Boton guardar -->
    <button class="btn" id="btnGuardar" onclick="actualizarPerfil()">
      <span class="btn-text">Guardar cambios</span>
      <div class="spinner"></div>
    </button>

    <!-- Boton cerrar sesion -->
    <button class="btn-cerrar" onclick="cerrarSesion()">
      Cerrar sesión
    </button>

  </div>

  <!-- Barra de navegacion inferior -->
  <nav class="navbar">

    <a href="dashboard.html" class="nav-item">
      <svg viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Inicio
    </a>

    <a href="calendario.html" class="nav-item">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Calendario
    </a>

    <a href="historial.html" class="nav-item">
      <svg viewBox="0 0 24 24">
        <line x1="8" y1="6" x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      Historial
    </a>

    <a href="perfil.html" class="nav-item active">
      <svg viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Perfil
    </a>

  </nav>

  <!-- Archivo JS con la logica del perfil -->
  <script src="../js/perfil.js"></script>

</body>
</html>
